<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Apresentação</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; overflow:hidden; background:#000; }

body {
  font-family: 'Syne', sans-serif;
  color: white;
}

/* ── SLIDE VIEWER ── */
#viewer {
  width:100vw;
  height:100vh;
  position:relative;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#000;
}

.slide {
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  opacity:0;
  pointer-events:none;
  transition: opacity 0.4s ease;
}
.slide.active {
  opacity:1;
  pointer-events:auto;
}
.slide img {
  max-width:100%;
  max-height:100vh;
  object-fit:contain;
  display:block;
}
.slide video {
  max-width:100%;
  max-height:100vh;
  object-fit:contain;
  display:block;
}

/* ── POINTER OVERLAY ── */
#pointer-layer {
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:20;
}
.pointer-marker {
  position:absolute;
  width:18px;
  height:18px;
  border-radius:50%;
  background:radial-gradient(circle at 35% 35%, #ffb1a7 0%, #ff4b3c 38%, #e11c12 100%);
  box-shadow:0 0 0 8px rgba(232,77,42,0.14), 0 10px 24px rgba(0,0,0,0.35);
  transform:translate(-50%, -50%);
  opacity:0;
  transition:opacity 0.15s ease;
}

.pointer-marker.visible {
  opacity:1;
}

/* ── QR OVERLAY ── */
#qr-overlay {
  position:fixed;
  inset:0;
  display:none;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  gap:20px;
  background:#ffffff;
  color:#0a0a0f;
  z-index:30;
  padding:32px;
}
#qr-overlay.visible { display:flex; }
.qr-card {
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:14px;
  padding:28px;
  border:1px solid rgba(0,0,0,0.1);
  border-radius:20px;
  background:#ffffff;
  box-shadow:0 18px 50px rgba(0,0,0,0.08);
}
.qr-title {
  font-family:'Syne',sans-serif;
  font-weight:800;
  font-size:1.1rem;
  letter-spacing:-0.03em;
  text-align:center;
}
.qr-subtitle {
  max-width:320px;
  text-align:center;
  font-size:0.85rem;
  color:#454545;
  line-height:1.5;
}
.qr-code {
  width:300px;
  height:300px;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#ffffff;
  padding:10px;
}
.qr-url {
  max-width:320px;
  font-family:'DM Sans',sans-serif;
  font-size:0.78rem;
  color:#666;
  word-break:break-all;
  text-align:center;
}

/* ── POLL OVERLAY ── */
#poll-overlay {
  position:fixed;
  inset:0;
  display:none;
  align-items:center;
  justify-content:center;
  background:rgba(0,0,0,0.68);
  z-index:40;
  padding:18px;
}
#poll-overlay.visible { display:flex; }
.poll-shell {
  width:min(720px, 100%);
  max-height:min(88vh, 980px);
  overflow:auto;
  background:rgba(10,10,15,0.94);
  border:1px solid rgba(255,255,255,0.12);
  border-radius:24px;
  box-shadow:0 30px 80px rgba(0,0,0,0.45);
  padding:22px;
}
.poll-kicker {
  font-size:0.7rem;
  font-weight:700;
  letter-spacing:0.16em;
  text-transform:uppercase;
  opacity:0.45;
  margin-bottom:12px;
}
.poll-question {
  font-size:clamp(1.4rem, 4vw, 2.4rem);
  line-height:1.12;
  letter-spacing:-0.04em;
  margin-bottom:12px;
}
.poll-subtitle {
  font-family:'DM Sans',sans-serif;
  font-size:0.9rem;
  line-height:1.5;
  color:rgba(255,255,255,0.6);
  margin-bottom:18px;
}
.poll-progress {
  display:none;
  margin-bottom:14px;
}
.poll-progress.visible { display:block; }
.poll-progress-top {
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;
  margin-bottom:7px;
  font-family:'DM Sans',sans-serif;
  font-size:0.78rem;
  color:rgba(255,255,255,0.62);
}
.poll-progress-bar {
  height:8px;
  border-radius:999px;
  overflow:hidden;
  background:rgba(255,255,255,0.1);
}
.poll-progress-fill {
  height:100%;
  width:0%;
  border-radius:999px;
  background:linear-gradient(90deg, #2a6ee8, #64a0ff);
  transition:width 0.25s ease;
}
.poll-choice-list {
  display:grid;
  gap:10px;
  margin-bottom:16px;
}
.poll-option {
  display:flex;
  align-items:center;
  gap:12px;
  border:1px solid rgba(255,255,255,0.12);
  background:rgba(255,255,255,0.04);
  border-radius:16px;
  padding:14px 16px;
  cursor:pointer;
  transition:transform 0.15s, border-color 0.15s, background 0.15s;
}
.poll-option:hover { transform:translateY(-1px); border-color:rgba(255,255,255,0.22); background:rgba(255,255,255,0.06); }
.poll-option input {
  width:18px;
  height:18px;
  flex-shrink:0;
  accent-color:#e84d2a;
}
.poll-option-text {
  font-family:'DM Sans',sans-serif;
  font-size:0.98rem;
  line-height:1.4;
}
.poll-submit-row {
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-top:12px;
}
.poll-submit-btn {
  border:none;
  border-radius:12px;
  background:#e84d2a;
  color:white;
  font-family:'Syne',sans-serif;
  font-weight:700;
  letter-spacing:0.06em;
  text-transform:uppercase;
  padding:14px 18px;
  cursor:pointer;
  transition:transform 0.15s, background 0.15s;
}
.poll-submit-btn:hover { background:#d03e1e; }
.poll-submit-btn:active { transform:scale(0.98); }
.poll-submit-btn:disabled { opacity:0.4; cursor:not-allowed; transform:none; }
.poll-note {
  font-family:'DM Sans',sans-serif;
  font-size:0.82rem;
  color:rgba(255,255,255,0.56);
  line-height:1.45;
  margin-top:10px;
}
.poll-error {
  color:#ff9e8e;
}
.poll-results {
  display:none;
  margin-top:12px;
}
.poll-results.visible { display:block; }
.poll-result-summary {
  display:grid;
  gap:10px;
  margin-bottom:16px;
}
.poll-result-summary-card {
  border:1px solid rgba(255,255,255,0.12);
  border-radius:16px;
  padding:14px 16px;
  background:rgba(255,255,255,0.04);
}
.poll-result-summary-title {
  font-family:'Syne',sans-serif;
  font-size:0.72rem;
  font-weight:700;
  letter-spacing:0.12em;
  text-transform:uppercase;
  opacity:0.55;
  margin-bottom:8px;
}
.poll-result-summary-value {
  font-size:1.5rem;
  letter-spacing:-0.03em;
}
.poll-result-list {
  display:grid;
  gap:10px;
}
.poll-result-row {
  border:1px solid rgba(255,255,255,0.12);
  border-radius:14px;
  padding:12px;
  background:rgba(255,255,255,0.04);
}
.poll-result-row-top {
  display:flex;
  justify-content:space-between;
  gap:12px;
  margin-bottom:8px;
  font-size:0.92rem;
}
.poll-result-bar {
  height:10px;
  border-radius:999px;
  background:rgba(255,255,255,0.08);
  overflow:hidden;
}
.poll-result-bar span {
  display:block;
  height:100%;
  border-radius:999px;
  background:linear-gradient(90deg, #e84d2a, #ff8b6a);
}
.poll-result-meta {
  margin-top:8px;
  font-family:'DM Sans',sans-serif;
  font-size:0.78rem;
  opacity:0.5;
}
.poll-result-correct {
  margin-top:10px;
  font-family:'DM Sans',sans-serif;
  font-size:0.84rem;
  color:#b8ffd7;
}
.poll-consolidated-title {
  font-family:'Syne',sans-serif;
  font-size:0.8rem;
  font-weight:700;
  letter-spacing:0.08em;
  text-transform:uppercase;
  opacity:0.58;
  margin:8px 0 10px;
}

/* ── EFFECTS ── */
#effect-layer {
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:25;
  overflow:hidden;
}
.balloon-effect {
  position:absolute;
  border-radius:50% 50% 46% 46%;
  box-shadow: inset -8px -10px 0 rgba(0,0,0,0.12);
  opacity:0;
  animation: balloon-float 5.8s ease-in forwards;
}
.balloon-effect::before {
  content:'';
  position:absolute;
  left:50%;
  bottom:-24px;
  width:1px;
  height:28px;
  background:rgba(255,255,255,0.45);
  transform:translateX(-50%);
}
.balloon-effect::after {
  content:'';
  position:absolute;
  top:12px;
  left:50%;
  width:8px;
  height:8px;
  background:rgba(255,255,255,0.26);
  border-radius:50%;
  transform:translateX(-50%);
}
@keyframes balloon-float {
  0% { transform:translate3d(0, 0, 0) scale(0.8) rotate(-2deg); opacity:0; }
  12% { opacity:1; }
  100% { transform:translate3d(var(--drift), -120vh, 0) scale(1.05) rotate(4deg); opacity:0; }
}

/* ── HUD ── */
#hud {
  position:fixed;
  bottom:0; left:0; right:0;
  padding:20px 28px;
  display:flex;
  align-items:center;
  gap:16px;
  background: linear-gradient(to top, rgba(0,0,0,0.7) 0%, transparent 100%);
  opacity:0;
  transition: opacity 0.3s;
  pointer-events:none;
}
body:hover #hud { opacity:1; }

.slide-counter {
  font-size:0.8rem;
  font-weight:700;
  letter-spacing:0.1em;
  text-transform:uppercase;
  opacity:0.7;
}
.hud-title {
  font-size:0.85rem;
  font-weight:700;
  opacity:0.9;
  flex:1;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}
.realtime-dot {
  width:8px; height:8px;
  border-radius:50%;
  background:#1a9e5c;
  animation:pulse-dot 2s ease-in-out infinite;
  flex-shrink:0;
}
.realtime-dot.offline { background:#888; animation:none; }
@keyframes pulse-dot {
  0%,100% { opacity:1; transform:scale(1); }
  50% { opacity:0.5; transform:scale(0.8); }
}
.realtime-label {
  font-size:0.72rem;
  font-weight:700;
  letter-spacing:0.08em;
  text-transform:uppercase;
  opacity:0.6;
}

/* ── LOADING ── */
#loading {
  position:fixed;
  inset:0;
  background:#000;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:20px;
  z-index:100;
  transition: opacity 0.5s ease;
}
#loading.fade { opacity:0; pointer-events:none; }

.load-logo {
  font-size:1.6rem;
  font-weight:800;
  letter-spacing:-0.04em;
}
.load-logo span { color:#e84d2a; }
.load-spinner {
  width:32px; height:32px;
  border:2px solid rgba(255,255,255,0.15);
  border-top-color:white;
  border-radius:50%;
  animation:spin 0.8s linear infinite;
}
@keyframes spin { to { transform:rotate(360deg); } }
.load-text {
  font-size:0.8rem;
  letter-spacing:0.1em;
  text-transform:uppercase;
  opacity:0.5;
}

/* ── ERROR ── */
#error-state {
  display:none;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  height:100vh;
  text-align:center;
  gap:16px;
  padding:40px;
}
#error-state h2 { font-size:1.4rem; opacity:0.9; }
#error-state p { font-size:0.9rem; opacity:0.5; max-width:320px; line-height:1.5; }
.btn-back {
  margin-top:8px;
  padding:12px 28px;
  background:white;
  color:#000;
  border:none;
  border-radius:8px;
  font-family:'Syne',sans-serif;
  font-weight:700;
  font-size:0.85rem;
  cursor:pointer;
  letter-spacing:0.04em;
  text-transform:uppercase;
}
</style>
</head>
<body>

<div id="loading">
  <div class="load-logo">Meu<span>Slide</span></div>
  <div class="load-spinner"></div>
  <div class="load-text">Carregando apresentação...</div>
</div>

<div id="error-state">
  <h2>Apresentação não encontrada</h2>
  <p>O código informado não existe. Verifique o endereço ou crie uma nova apresentação.</p>
  <button class="btn-back" onclick="history.back()">← Voltar</button>
</div>

<div id="viewer"></div>

<div id="pointer-layer">
  <div class="pointer-marker" id="pointer-marker"></div>
</div>

<div id="effect-layer"></div>

<div id="qr-overlay" aria-live="polite">
  <div class="qr-card">
    <div class="qr-title">Escaneie para abrir este slide</div>
    <div class="qr-subtitle">A câmera do celular vai ler o QR em fundo branco com mais facilidade.</div>
    <div class="qr-code" id="qr-code"></div>
    <div class="qr-url" id="qr-url"></div>
  </div>
</div>

<div id="poll-overlay" aria-live="polite">
  <div class="poll-shell">
    <div class="poll-kicker" id="poll-kicker">Enquete ao vivo</div>
    <div class="poll-question" id="poll-question"></div>
    <div class="poll-subtitle" id="poll-subtitle"></div>
    <div class="poll-progress" id="poll-progress">
      <div class="poll-progress-top">
        <span id="poll-progress-label">Progresso</span>
        <span id="poll-progress-text">0%</span>
      </div>
      <div class="poll-progress-bar"><div class="poll-progress-fill" id="poll-progress-fill"></div></div>
    </div>
    <div class="poll-choice-list" id="poll-choice-list"></div>
    <div class="poll-submit-row" id="poll-submit-row">
      <button class="poll-submit-btn" id="poll-submit-btn" type="button">Responder</button>
      <button class="poll-submit-btn" id="poll-clear-btn" type="button" style="background:rgba(255,255,255,0.12);">Limpar seleção</button>
    </div>
    <div class="poll-note" id="poll-note"></div>
    <div class="poll-results" id="poll-results"></div>
  </div>
</div>

<div id="hud">
  <div class="slide-counter" id="hud-counter">1 / 1</div>
  <div class="hud-title" id="hud-title"></div>
  <div class="realtime-dot" id="realtime-dot"></div>
  <div class="realtime-label">Ao vivo</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.4/dist/confetti.browser.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script>
// ══════════════════════════════════════
//  ⚙️  CONFIGURE AQUI
// ══════════════════════════════════════
const SUPABASE_URL = 'https://mamhiknpgqbzszmloibk.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_99_Zxj_XydCC8x7cAaKmpA_hbEgebR0';
// ══════════════════════════════════════

const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

function getCodigo() {
  const p = new URLSearchParams(location.search);
  return (p.get('codigo') || location.pathname.replace(/^\//, '').split('/')[0] || '').toLowerCase();
}

function getInitialSlideIndex() {
  const p = new URLSearchParams(location.search);
  const slideParam = p.get('slide');
  if (!slideParam) return null;
  const parsed = Number.parseInt(slideParam, 10);
  if (!Number.isFinite(parsed) || parsed < 1) return null;
  return parsed - 1;
}

const codigo = getCodigo();
let slides = [];
let currentIndex = 0;
let apresentacaoId = null;
let pointerState = { x: 0.5, y: 0.5, visible: false };
let qrVisible = false;
let lastEffectStamp = null;
let activePoll = null;
let activePollOptions = [];
let activePollResponses = [];
let quizPolls = [];
let quizOptionsByPoll = new Map();
let quizResponsesByPoll = new Map();
let quizAllResponsesByPoll = new Map();
let quizCurrentIndex = 0;
let pollSelection = [];
let pollResponsesChannel = null;
let currentLoadedPollId = null;
let pollControlState = { enquete_id: null, enquete_status: 'closed', acao: null };

function escapeHtml(value) {
  return String(value || '')
    .replaceAll('&', '&amp;')
    .replaceAll('<', '&lt;')
    .replaceAll('>', '&gt;')
    .replaceAll('"', '&quot;')
    .replaceAll("'", '&#39;');
}

function getPollParticipantId() {
  const key = `meuslide-participant-${codigo}`;
  const existing = localStorage.getItem(key);
  if (existing) return existing;
  const created = (crypto.randomUUID ? crypto.randomUUID() : `${Date.now()}-${Math.random().toString(36).slice(2)}`);
  localStorage.setItem(key, created);
  return created;
}

const pollParticipantId = getPollParticipantId();

function getSlideKind(slide) {
  const tipo = (slide?.tipo || '').toLowerCase();
  if (tipo === 'video' || tipo === 'imagem') return tipo;
  const source = `${slide?.arquivo_nome || ''} ${slide?.arquivo_url || ''}`.toLowerCase();
  if (/\.(mp4|webm|ogg|mov)(?:$|\?)/.test(source)) return 'video';
  return 'imagem';
}

function getSlideUrl(slideIndex = currentIndex) {
  return `${location.origin}/apresentacao.html?codigo=${encodeURIComponent(codigo)}`;
}

function getCurrentMediaRect() {
  const currentSlide = slides[currentIndex];
  if (!currentSlide) return document.getElementById('viewer').getBoundingClientRect();
  const media = currentSlide.querySelector('img, video');
  if (media) return media.getBoundingClientRect();
  return currentSlide.getBoundingClientRect();
}

function renderPointer() {
  const marker = document.getElementById('pointer-marker');
  if (!marker) return;
  if (!pointerState.visible) {
    marker.classList.remove('visible');
    return;
  }

  const rect = getCurrentMediaRect();
  const left = rect.left + rect.width * pointerState.x;
  const top = rect.top + rect.height * pointerState.y;
  marker.style.left = `${left}px`;
  marker.style.top = `${top}px`;
  marker.classList.add('visible');
}

function syncPointerFromPayload(payload) {
  const newX = payload.pointer_x;
  const newY = payload.pointer_y;
  const newVisible = payload.pointer_visible;
  if (typeof newX === 'number' && typeof newY === 'number') {
    pointerState.x = Math.max(0, Math.min(1, newX));
    pointerState.y = Math.max(0, Math.min(1, newY));
  }
  if (typeof newVisible === 'boolean') {
    pointerState.visible = newVisible;
  }
  renderPointer();
}

function renderQrOverlay() {
  const overlay = document.getElementById('qr-overlay');
  const codeEl = document.getElementById('qr-code');
  const urlEl = document.getElementById('qr-url');

  if (!overlay || !codeEl || !urlEl) return;

  if (!qrVisible) {
    overlay.classList.remove('visible');
    codeEl.innerHTML = '';
    urlEl.textContent = '';
    return;
  }

  const qrUrl = getSlideUrl(currentIndex);
  codeEl.innerHTML = '';

  if (window.QRCode) {
    new QRCode(codeEl, {
      text: qrUrl,
      width: 280,
      height: 280,
      colorDark: '#000000',
      colorLight: '#ffffff',
      correctLevel: QRCode.CorrectLevel.M
    });
  } else {
    codeEl.textContent = qrUrl;
  }

  urlEl.textContent = qrUrl;
  overlay.classList.add('visible');
}

function syncQrFromPayload(payload) {
  if (typeof payload.qr_visible === 'boolean') {
    qrVisible = payload.qr_visible;
    renderQrOverlay();
  }
}

function setPollOverlayVisible(visible) {
  const overlay = document.getElementById('poll-overlay');
  if (!overlay) return;
  overlay.classList.toggle('visible', visible);
}

function clearPollOverlay() {
  activePoll = null;
  activePollOptions = [];
  activePollResponses = [];
  quizPolls = [];
  quizOptionsByPoll = new Map();
  quizResponsesByPoll = new Map();
  quizAllResponsesByPoll = new Map();
  quizCurrentIndex = 0;
  pollSelection = [];
  const kickerEl = document.getElementById('poll-kicker');
  const questionEl = document.getElementById('poll-question');
  const subtitleEl = document.getElementById('poll-subtitle');
  const progressEl = document.getElementById('poll-progress');
  const choiceList = document.getElementById('poll-choice-list');
  const noteEl = document.getElementById('poll-note');
  const resultsEl = document.getElementById('poll-results');
  if (kickerEl) kickerEl.textContent = 'Enquete ao vivo';
  if (questionEl) questionEl.textContent = '';
  if (subtitleEl) subtitleEl.textContent = '';
  if (progressEl) progressEl.classList.remove('visible');
  if (choiceList) choiceList.innerHTML = '';
  if (noteEl) noteEl.textContent = '';
  if (resultsEl) {
    resultsEl.innerHTML = '';
    resultsEl.classList.remove('visible');
  }
  setPollOverlayVisible(false);
}

function formatPollSelectionText(ids) {
  return ids.length ? `${ids.length} resposta${ids.length !== 1 ? 's' : ''} selecionada${ids.length !== 1 ? 's' : ''}` : 'Nenhuma opção selecionada';
}

function getCurrentQuizPoll() {
  if (!quizPolls.length) return null;
  if (quizCurrentIndex < 0 || quizCurrentIndex >= quizPolls.length) return null;
  return quizPolls[quizCurrentIndex];
}

function getFirstUnansweredQuizIndex() {
  for (let index = 0; index < quizPolls.length; index += 1) {
    const poll = quizPolls[index];
    if (!quizResponsesByPoll.has(poll.id)) return index;
  }
  return quizPolls.length;
}

function renderQuizProgress(answeredCount, totalCount, label = 'Progresso do quiz') {
  const progressEl = document.getElementById('poll-progress');
  const labelEl = document.getElementById('poll-progress-label');
  const textEl = document.getElementById('poll-progress-text');
  const fillEl = document.getElementById('poll-progress-fill');

  if (!progressEl || !labelEl || !textEl || !fillEl) return;

  const safeTotal = Math.max(1, totalCount || 0);
  const safeAnswered = Math.max(0, Math.min(answeredCount || 0, safeTotal));
  const pct = Math.round((safeAnswered / safeTotal) * 100);

  labelEl.textContent = label;
  textEl.textContent = `${safeAnswered}/${safeTotal}`;
  fillEl.style.width = `${pct}%`;
  progressEl.classList.add('visible');
}

function hideQuizProgress() {
  const progressEl = document.getElementById('poll-progress');
  if (progressEl) progressEl.classList.remove('visible');
}

function showQuizCompletedState() {
  const kickerEl = document.getElementById('poll-kicker');
  const questionEl = document.getElementById('poll-question');
  const subtitleEl = document.getElementById('poll-subtitle');
  const choiceList = document.getElementById('poll-choice-list');
  const submitRow = document.getElementById('poll-submit-row');
  const noteEl = document.getElementById('poll-note');
  const resultsEl = document.getElementById('poll-results');

  setPollOverlayVisible(true);
  if (kickerEl) kickerEl.textContent = 'Quiz ao vivo';
  if (questionEl) questionEl.textContent = 'Quiz concluído';
  if (subtitleEl) subtitleEl.textContent = `Você respondeu ${quizPolls.length} de ${quizPolls.length} perguntas.`;
  renderQuizProgress(quizPolls.length, quizPolls.length, 'Progresso do quiz');
  if (choiceList) {
    choiceList.innerHTML = '';
    choiceList.style.display = 'none';
  }
  if (submitRow) submitRow.style.display = 'none';
  if (resultsEl) {
    resultsEl.innerHTML = '';
    resultsEl.classList.remove('visible');
  }
  if (noteEl) noteEl.textContent = 'Obrigado por participar. Aguarde os resultados.';
}

function renderPollOverlay() {
  const kickerEl = document.getElementById('poll-kicker');
  const questionEl = document.getElementById('poll-question');
  const subtitleEl = document.getElementById('poll-subtitle');
  const choiceList = document.getElementById('poll-choice-list');
  const submitRow = document.getElementById('poll-submit-row');
  const submitBtn = document.getElementById('poll-submit-btn');
  const clearBtn = document.getElementById('poll-clear-btn');
  const noteEl = document.getElementById('poll-note');
  const resultsEl = document.getElementById('poll-results');
  const isConsolidatedResults = pollControlState.enquete_status === 'results' && pollControlState.acao === 'poll_results_all';

  if (pollControlState.enquete_status === 'closed') {
    clearPollOverlay();
    return;
  }

  const isQuizFlow = pollControlState.enquete_status === 'open' && quizPolls.length > 0;

  if (isQuizFlow) {
    if (quizCurrentIndex >= quizPolls.length) {
      showQuizCompletedState();
      return;
    }

    activePoll = getCurrentQuizPoll();
    activePollOptions = quizOptionsByPoll.get(activePoll.id) || [];
  }

  if (!activePoll) {
    clearPollOverlay();
    return;
  }

  setPollOverlayVisible(true);

  if (kickerEl) {
    if (isQuizFlow) {
      kickerEl.textContent = `Quiz ao vivo · ${quizCurrentIndex + 1}/${quizPolls.length}`;
    } else if (isConsolidatedResults) {
      kickerEl.textContent = 'Resultados consolidados';
    } else {
      kickerEl.textContent = 'Enquete ao vivo';
    }
  }

  if (questionEl) questionEl.textContent = activePoll.pergunta || 'Enquete';
  if (subtitleEl) {
    const modeText = isQuizFlow ? ' · fluxo sequencial' : (isConsolidatedResults ? ' · visão geral do quiz' : '');
    subtitleEl.textContent = `${activePoll.tipo === 'checkbox' ? 'Caixa de seleção' : 'Múltipla escolha'}${activePoll.com_respostas_certas ? ' · quiz com respostas corretas' : ' · pesquisa aberta'}${modeText}`;
  }

  if (isQuizFlow) {
    renderQuizProgress(quizCurrentIndex, quizPolls.length, 'Progresso do quiz');
  } else {
    hideQuizProgress();
  }

  if (pollControlState.enquete_status === 'results') {
    if (submitRow) submitRow.style.display = 'none';
    if (choiceList) choiceList.style.display = 'none';
    if (isConsolidatedResults) {
      if (questionEl) questionEl.textContent = 'Resumo completo do quiz';
      if (subtitleEl) subtitleEl.textContent = `${quizPolls.length} pergunta${quizPolls.length !== 1 ? 's' : ''} consideradas no consolidado.`;
      if (noteEl) noteEl.textContent = 'Visão geral com participantes, acertos e desempenho por pergunta.';
      renderQuizConsolidatedResults();
    } else {
      if (noteEl) noteEl.textContent = activePoll.com_respostas_certas
        ? 'Os resultados mostram quantas pessoas acertaram e erraram.'
        : 'Resumo das respostas enviadas pela audiência.';
      renderPollResults();
    }
    return;
  }

  if (choiceList) choiceList.style.display = 'grid';
  if (submitRow) submitRow.style.display = 'flex';
  if (resultsEl) {
    resultsEl.innerHTML = '';
    resultsEl.classList.remove('visible');
  }
  if (noteEl) {
    const defaultNote = isQuizFlow
      ? 'Escolha uma ou mais opções e toque em Responder para avançar.'
      : 'Escolha uma ou mais opções e toque em Responder.';
    noteEl.textContent = pollSelection.length ? formatPollSelectionText(pollSelection) : defaultNote;
  }
  if (submitBtn) submitBtn.textContent = isQuizFlow && quizCurrentIndex === (quizPolls.length - 1) ? 'Finalizar quiz' : 'Responder';
  if (submitBtn) submitBtn.disabled = false;
  if (clearBtn) clearBtn.disabled = false;

  if (choiceList) {
    choiceList.innerHTML = '';
    const inputType = activePoll.tipo === 'checkbox' ? 'checkbox' : 'radio';
    activePollOptions.forEach(option => {
      const optionRow = document.createElement('label');
      optionRow.className = 'poll-option';
      optionRow.innerHTML = `
        <input type="${inputType}" name="poll-choice" value="${option.id}" ${pollSelection.includes(option.id) ? 'checked' : ''}>
        <span class="poll-option-text">${escapeHtml(option.texto)}</span>
      `;
      optionRow.querySelector('input').addEventListener('change', () => {
        if (activePoll.tipo === 'checkbox') {
          const selected = new Set(pollSelection);
          if (optionRow.querySelector('input').checked) selected.add(option.id);
          else selected.delete(option.id);
          pollSelection = Array.from(selected);
        } else {
          pollSelection = [option.id];
        }
        if (noteEl) noteEl.textContent = formatPollSelectionText(pollSelection);
      });
      choiceList.appendChild(optionRow);
    });
  }

  if (clearBtn) {
    clearBtn.onclick = () => {
      pollSelection = [];
      renderPollOverlay();
    };
  }

  if (submitBtn) {
    submitBtn.onclick = submitPollResponse;
  }
}

function renderPollResults() {
  const resultsEl = document.getElementById('poll-results');
  if (!resultsEl) return;

  const responseRows = activePollResponses || [];
  const counts = new Map(activePollOptions.map(option => [option.id, 0]));
  responseRows.forEach(row => {
    const answers = Array.isArray(row.respostas) ? row.respostas : [];
    answers.forEach(optionId => {
      counts.set(optionId, (counts.get(optionId) || 0) + 1);
    });
  });

  const totalResponses = responseRows.length;
  const maxCount = Math.max(1, ...Array.from(counts.values()));
  const correctIds = new Set(activePollOptions.filter(option => option.correta).map(option => option.id));
  let correctResponses = 0;
  let incorrectResponses = 0;

  if (activePoll.com_respostas_certas) {
    responseRows.forEach(row => {
      const selectedSet = new Set(Array.isArray(row.respostas) ? row.respostas : []);
      const isCorrect = selectedSet.size === correctIds.size && Array.from(selectedSet).every(id => correctIds.has(id));
      if (isCorrect) correctResponses += 1;
      else incorrectResponses += 1;
    });
  }

  const summaryCards = [
    `<div class="poll-result-summary-card"><div class="poll-result-summary-title">Respostas</div><div class="poll-result-summary-value">${totalResponses}</div></div>`,
  ];
  if (activePoll.com_respostas_certas) {
    summaryCards.push(`<div class="poll-result-summary-card"><div class="poll-result-summary-title">Acertos</div><div class="poll-result-summary-value">${correctResponses}</div></div>`);
    summaryCards.push(`<div class="poll-result-summary-card"><div class="poll-result-summary-title">Erros</div><div class="poll-result-summary-value">${incorrectResponses}</div></div>`);
  }

  resultsEl.innerHTML = `
    <div class="poll-result-summary">${summaryCards.join('')}</div>
    <div class="poll-result-list">
      ${activePollOptions.map(option => {
        const count = counts.get(option.id) || 0;
        const percent = totalResponses > 0 ? Math.round((count / totalResponses) * 100) : 0;
        const correctMarker = activePoll.com_respostas_certas && option.correta ? '<div class="poll-result-correct">Resposta correta</div>' : '';
        return `
          <div class="poll-result-row">
            <div class="poll-result-row-top">
              <div>${escapeHtml(option.texto)}</div>
              <div>${count} voto${count !== 1 ? 's' : ''}</div>
            </div>
            <div class="poll-result-bar"><span style="width:${percent}%"></span></div>
            <div class="poll-result-meta">${percent}% da audiência escolheu esta opção</div>
            ${correctMarker}
          </div>
        `;
      }).join('')}
    </div>
  `;

  resultsEl.classList.add('visible');
}

function renderQuizConsolidatedResults() {
  const resultsEl = document.getElementById('poll-results');
  if (!resultsEl) return;

  const participantsSet = new Set();
  let totalAnswers = 0;
  let totalCorrect = 0;
  let totalCheckedQuestions = 0;

  const questionBlocks = quizPolls.map((poll, index) => {
    const options = quizOptionsByPoll.get(poll.id) || [];
    const rows = quizAllResponsesByPoll.get(poll.id) || [];
    const counts = new Map(options.map(option => [option.id, 0]));

    rows.forEach(row => {
      if (row.participante_id) participantsSet.add(row.participante_id);
      totalAnswers += 1;
      const answers = Array.isArray(row.respostas) ? row.respostas : [];
      answers.forEach(optionId => {
        counts.set(optionId, (counts.get(optionId) || 0) + 1);
      });
    });

    let correctCount = 0;
    if (poll.com_respostas_certas) {
      const correctIds = new Set(options.filter(option => option.correta).map(option => option.id));
      rows.forEach(row => {
        const selectedSet = new Set(Array.isArray(row.respostas) ? row.respostas : []);
        const isCorrect = selectedSet.size === correctIds.size && Array.from(selectedSet).every(id => correctIds.has(id));
        if (isCorrect) correctCount += 1;
      });
      totalCorrect += correctCount;
      totalCheckedQuestions += rows.length;
    }

    return `
      <div class="poll-result-row">
        <div class="poll-consolidated-title">Pergunta ${index + 1}</div>
        <div class="poll-result-row-top">
          <div>${escapeHtml(poll.pergunta)}</div>
          <div>${rows.length} resposta${rows.length !== 1 ? 's' : ''}</div>
        </div>
        ${poll.com_respostas_certas ? `<div class="poll-result-meta">Acertos: ${correctCount}/${rows.length}</div>` : '<div class="poll-result-meta">Pergunta sem gabarito configurado.</div>'}
        <div class="poll-result-list" style="margin-top:10px;">
          ${options.map(option => {
            const count = counts.get(option.id) || 0;
            const percent = rows.length > 0 ? Math.round((count / rows.length) * 100) : 0;
            const correctMarker = poll.com_respostas_certas && option.correta ? '<div class="poll-result-correct">Resposta correta</div>' : '';
            return `
              <div class="poll-result-row" style="padding:10px; border-radius:10px;">
                <div class="poll-result-row-top">
                  <div>${escapeHtml(option.texto)}</div>
                  <div>${count}</div>
                </div>
                <div class="poll-result-bar"><span style="width:${percent}%"></span></div>
                <div class="poll-result-meta">${percent}% selecionaram esta opção</div>
                ${correctMarker}
              </div>
            `;
          }).join('')}
        </div>
      </div>
    `;
  });

  const summaryCards = [
    `<div class="poll-result-summary-card"><div class="poll-result-summary-title">Participantes</div><div class="poll-result-summary-value">${participantsSet.size}</div></div>`,
    `<div class="poll-result-summary-card"><div class="poll-result-summary-title">Perguntas</div><div class="poll-result-summary-value">${quizPolls.length}</div></div>`,
    `<div class="poll-result-summary-card"><div class="poll-result-summary-title">Respostas</div><div class="poll-result-summary-value">${totalAnswers}</div></div>`
  ];

  if (totalCheckedQuestions > 0) {
    const accuracy = Math.round((totalCorrect / totalCheckedQuestions) * 100);
    summaryCards.push(`<div class="poll-result-summary-card"><div class="poll-result-summary-title">Taxa de acerto</div><div class="poll-result-summary-value">${accuracy}%</div></div>`);
  }

  resultsEl.innerHTML = `
    <div class="poll-result-summary">${summaryCards.join('')}</div>
    <div class="poll-result-list">${questionBlocks.join('')}</div>
  `;

  resultsEl.classList.add('visible');
}

async function loadActivePollFromControl(controlPayload) {
  const pollId = controlPayload?.enquete_id || pollControlState.enquete_id;
  const status = controlPayload?.enquete_status || pollControlState.enquete_status || 'closed';
  const action = controlPayload?.acao || pollControlState.acao || null;

  pollControlState = { enquete_id: pollId || null, enquete_status: status, acao: action };

  if (pollResponsesChannel) {
    await db.removeChannel(pollResponsesChannel);
    pollResponsesChannel = null;
  }

  if (!pollId || status === 'closed') {
    clearPollOverlay();
    return;
  }

  if (status === 'open' || (status === 'results' && action === 'poll_results_all')) {
    const { data: allPolls, error: pollsError } = await db
      .from('enquetes')
      .select('id, pergunta, tipo, com_respostas_certas, ordem')
      .eq('apresentacao_id', apresentacaoId)
      .order('ordem');

    if (pollsError || !allPolls || allPolls.length === 0) {
      clearPollOverlay();
      return;
    }

    const startAt = allPolls.findIndex(item => item.id === pollId);
    quizPolls = allPolls.slice(startAt >= 0 ? startAt : 0);
    const quizPollIds = quizPolls.map(item => item.id);

    const [optionsRes, myResponsesRes, allResponsesRes] = await Promise.all([
      db.from('enquete_opcoes').select('id, enquete_id, texto, correta, ordem').in('enquete_id', quizPollIds).order('ordem'),
      db.from('enquete_respostas').select('enquete_id, respostas').in('enquete_id', quizPollIds).eq('participante_id', pollParticipantId),
      db.from('enquete_respostas').select('enquete_id, participante_id, respostas').in('enquete_id', quizPollIds)
    ]);

    quizOptionsByPoll = new Map();
    (optionsRes.data || []).forEach(option => {
      const list = quizOptionsByPoll.get(option.enquete_id) || [];
      list.push(option);
      quizOptionsByPoll.set(option.enquete_id, list);
    });

    quizResponsesByPoll = new Map();
    (myResponsesRes.data || []).forEach(response => {
      if (Array.isArray(response.respostas)) {
        quizResponsesByPoll.set(response.enquete_id, response.respostas);
      }
    });

    quizAllResponsesByPoll = new Map();
    (allResponsesRes.data || []).forEach(response => {
      const list = quizAllResponsesByPoll.get(response.enquete_id) || [];
      list.push(response);
      quizAllResponsesByPoll.set(response.enquete_id, list);
    });

    quizCurrentIndex = status === 'open' ? getFirstUnansweredQuizIndex() : 0;
    activePoll = getCurrentQuizPoll();
    if (activePoll) {
      activePollOptions = quizOptionsByPoll.get(activePoll.id) || [];
      activePollResponses = quizAllResponsesByPoll.get(activePoll.id) || [];
      pollSelection = status === 'open' ? (quizResponsesByPoll.get(activePoll.id) || []) : [];
    }

    renderPollOverlay();
    return;
  }

  quizPolls = [];
  quizOptionsByPoll = new Map();
  quizResponsesByPoll = new Map();
  quizAllResponsesByPoll = new Map();
  quizCurrentIndex = 0;

  const [pollRes, optionsRes, responsesRes, myResponseRes] = await Promise.all([
    db.from('enquetes').select('id, pergunta, tipo, com_respostas_certas').eq('id', pollId).single(),
    db.from('enquete_opcoes').select('id, enquete_id, texto, correta, ordem').eq('enquete_id', pollId).order('ordem'),
    db.from('enquete_respostas').select('enquete_id, participante_id, respostas').eq('enquete_id', pollId),
    db.from('enquete_respostas').select('respostas').eq('enquete_id', pollId).eq('participante_id', pollParticipantId).maybeSingle()
  ]);

  if (!pollRes.data) {
    clearPollOverlay();
    return;
  }

  activePoll = pollRes.data;
  activePollOptions = optionsRes.data || [];
  activePollResponses = responsesRes.data || [];
  if (myResponseRes.data && Array.isArray(myResponseRes.data.respostas)) {
    pollSelection = myResponseRes.data.respostas;
  } else if (pollSelection.length === 0 || currentLoadedPollId !== pollId) {
    pollSelection = [];
  }
  currentLoadedPollId = pollId;

  renderPollOverlay();

  pollResponsesChannel = db.channel(`poll-responses-${pollId}`)
    .on('postgres_changes', {
      event: '*',
      schema: 'public',
      table: 'enquete_respostas',
      filter: `enquete_id=eq.${pollId}`
    }, async () => {
      const { data: refreshedResponses } = await db
        .from('enquete_respostas')
        .select('enquete_id, participante_id, respostas')
        .eq('enquete_id', pollId);
      activePollResponses = refreshedResponses || [];
      if (pollControlState.enquete_status === 'results') {
        renderPollResults();
      }
    })
    .subscribe();
}

async function submitPollResponse() {
  if (!activePoll || pollControlState.enquete_status !== 'open') return;
  if (!pollSelection.length) {
    const noteEl = document.getElementById('poll-note');
    if (noteEl) noteEl.textContent = 'Selecione pelo menos uma opção antes de responder.';
    return;
  }

  const submitBtn = document.getElementById('poll-submit-btn');
  if (submitBtn) submitBtn.disabled = true;

  const { error } = await db
    .from('enquete_respostas')
    .upsert({
      enquete_id: activePoll.id,
      participante_id: pollParticipantId,
      respostas: pollSelection,
      updated_at: new Date().toISOString()
    }, { onConflict: 'enquete_id,participante_id' });

  if (error) {
    const noteEl = document.getElementById('poll-note');
    if (noteEl) noteEl.textContent = `Não foi possível salvar sua resposta: ${error.message}`;
    if (submitBtn) submitBtn.disabled = false;
    return;
  }

  if (quizPolls.length) {
    quizResponsesByPoll.set(activePoll.id, [...pollSelection]);
    quizCurrentIndex = Math.min(quizCurrentIndex + 1, quizPolls.length);
    const nextPoll = getCurrentQuizPoll();
    if (nextPoll) {
      activePoll = nextPoll;
      activePollOptions = quizOptionsByPoll.get(nextPoll.id) || [];
      pollSelection = quizResponsesByPoll.get(nextPoll.id) || [];
    }
    if (submitBtn) submitBtn.disabled = false;
    renderPollOverlay();
    return;
  }

  const noteEl = document.getElementById('poll-note');
  if (noteEl) noteEl.textContent = 'Resposta salva. Você pode alterar enquanto a enquete estiver aberta.';
  if (submitBtn) submitBtn.disabled = false;
}

function clearEffectLayer() {
  const layer = document.getElementById('effect-layer');
  if (layer) layer.innerHTML = '';
}

function fireFesta() {
  if (!window.confetti) return;
  const duration = 1400;
  const end = Date.now() + duration;
  const colors = ['#e84d2a', '#2a6ee8', '#1a9e5c', '#f5f3ee', '#ffd166'];
  (function frame() {
    window.confetti({ particleCount: 8, angle: 60, spread: 60, origin: { x: 0 }, colors, disableForReducedMotion: true });
    window.confetti({ particleCount: 8, angle: 120, spread: 60, origin: { x: 1 }, colors, disableForReducedMotion: true });
    if (Date.now() < end) requestAnimationFrame(frame);
  }());
}

function fireCoracoes() {
  if (!window.confetti) return;
  const heart = window.confetti.shapeFromText({ text: '💖', scalar: 2.2, color: '#ff4d8d' });
  const end = Date.now() + 1200;
  (function frame() {
    window.confetti({
      particleCount: 10,
      spread: 85,
      startVelocity: 28,
      origin: { y: 0.75 },
      shapes: [heart],
      scalar: 1.2,
      colors: ['#ff4d8d'],
      disableForReducedMotion: true
    });
    if (Date.now() < end) requestAnimationFrame(frame);
  }());
}

function fireBaloes() {
  const layer = document.getElementById('effect-layer');
  if (!layer) return;
  const colors = ['#ff6b6b', '#feca57', '#48dbfb', '#1dd1a1', '#5f27cd', '#ff9ff3'];
  for (let i = 0; i < 8; i += 1) {
    const balloon = document.createElement('div');
    balloon.className = 'balloon-effect';
    const size = 34 + Math.random() * 18;
    balloon.style.left = `${8 + Math.random() * 84}%`;
    balloon.style.bottom = `${-10 - Math.random() * 18}%`;
    balloon.style.width = `${size}px`;
    balloon.style.height = `${size * 1.25}px`;
    balloon.style.background = colors[i % colors.length];
    balloon.style.animationDelay = `${Math.random() * 0.6}s`;
    balloon.style.setProperty('--drift', `${-20 + Math.random() * 40}px`);
    layer.appendChild(balloon);
    balloon.addEventListener('animationend', () => balloon.remove());
  }
  setTimeout(clearEffectLayer, 6000);
}

function triggerEffect(efeito) {
  if (efeito === 'festa') fireFesta();
  if (efeito === 'coracoes') fireCoracoes();
  if (efeito === 'baloes') fireBaloes();
}

function showError() {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('error-state').style.display = 'flex';
}

function buildSlides(slidesData) {
  const viewer = document.getElementById('viewer');
  viewer.innerHTML = '';
  slides = [];

  slidesData.forEach((s, i) => {
    const div = document.createElement('div');
    div.className = 'slide';
    div.id = `slide-${i}`;

    if (getSlideKind(s) === 'video') {
      const v = document.createElement('video');
      v.src = s.arquivo_url;
      v.controls = false;
      v.loop = true;
      v.playsInline = true;
      v.muted = true;
      v.addEventListener('loadedmetadata', renderPointer);
      div.appendChild(v);
    } else {
      const img = document.createElement('img');
      img.src = s.arquivo_url;
      img.alt = `Slide ${i+1}`;
      img.addEventListener('load', renderPointer);
      div.appendChild(img);
    }

    viewer.appendChild(div);
    slides.push(div);
  });
}

function goToSlide(index, skipPause) {
  if (index < 0 || index >= slides.length) return;

  // Pausa vídeo atual
  if (!skipPause) {
    const curVid = slides[currentIndex]?.querySelector('video');
    if (curVid) { curVid.pause(); curVid.currentTime = 0; }
  }

  slides.forEach(s => s.classList.remove('active'));
  currentIndex = index;
  slides[currentIndex].classList.add('active');

  const activeVideo = slides[currentIndex]?.querySelector('video');
  if (activeVideo) {
    activeVideo.muted = true;
    activeVideo.play().catch(() => {});
  }

  document.getElementById('hud-counter').textContent = `${currentIndex + 1} / ${slides.length}`;
  window.requestAnimationFrame(renderPointer);
  renderQrOverlay();
}

function handleAcao(acao, slideAtual) {
  if (acao === 'play_video' || acao === 'pause_video' || acao === 'restart_video') {
    const vid = slides[currentIndex]?.querySelector('video');
    if (!vid) return;

    if (acao === 'play_video') {
      vid.muted = true;
      vid.play().catch(() => {});
    } else if (acao === 'pause_video') {
      vid.pause();
    } else if (acao === 'restart_video') {
      vid.currentTime = 0;
      vid.muted = true;
      vid.play().catch(() => {});
    }
    return;
  }

  if (acao === 'proximo' || acao === 'anterior' || acao === 'ir_para' || acao === 'primeiro') {
    const target = slideAtual;
    
    if (target !== currentIndex) {
      goToSlide(target);
    }
  }
}

async function init() {
  if (!codigo) { showError(); return; }

  // Busca apresentação
  const { data: ap } = await db
    .from('apresentacoes')
    .select('id, titulo')
    .eq('codigo', codigo)
    .single();

  if (!ap) { showError(); return; }
  apresentacaoId = ap.id;

  document.title = ap.titulo || 'Apresentação';
  document.getElementById('hud-title').textContent = ap.titulo || codigo;

  // Busca slides
  const { data: slidesData } = await db
    .from('slides')
    .select('*')
    .eq('apresentacao_id', ap.id)
    .order('ordem');

  if (!slidesData || slidesData.length === 0) { showError(); return; }

  buildSlides(slidesData);

  // Busca estado atual
  const { data: ctrl } = await db
    .from('controle')
    .select('slide_atual, pointer_x, pointer_y, pointer_visible, qr_visible, efeito, efeito_updated_at, enquete_id, enquete_status, enquete_updated_at, acao')
    .eq('apresentacao_id', ap.id)
    .single();

  const urlStartIndex = getInitialSlideIndex();
  const startIndex = urlStartIndex !== null ? Math.min(urlStartIndex, slides.length - 1) : (ctrl ? Math.min(ctrl.slide_atual, slides.length - 1) : 0);
  goToSlide(startIndex);
  if (ctrl) syncPointerFromPayload(ctrl);
  if (ctrl) lastEffectStamp = ctrl.efeito_updated_at || null;
  if (ctrl) {
    qrVisible = ctrl.qr_visible ?? false;
    renderQrOverlay();
  }

  await loadActivePollFromControl(ctrl);

  // Remove loading
  const loadEl = document.getElementById('loading');
  loadEl.classList.add('fade');
  setTimeout(() => loadEl.style.display = 'none', 500);

  // ── Realtime ──
  const channel = db.channel(`controle-${ap.id}`)
    .on('postgres_changes', {
      event: 'UPDATE',
      schema: 'public',
      table: 'controle',
      filter: `apresentacao_id=eq.${ap.id}`
    }, payload => {
      const { slide_atual, acao } = payload.new;
      handleAcao(acao, slide_atual);
      syncPointerFromPayload(payload.new);
      syncQrFromPayload(payload.new);
      if (payload.new.enquete_id !== pollControlState.enquete_id || payload.new.enquete_status !== pollControlState.enquete_status || payload.new.acao !== pollControlState.acao) {
        loadActivePollFromControl(payload.new);
      }
      const effectStamp = payload.new.efeito_updated_at || null;
      const effectType = payload.new.efeito;
      if (effectType && effectType !== 'none' && effectStamp && effectStamp !== lastEffectStamp) {
        lastEffectStamp = effectStamp;
        triggerEffect(effectType);
      }
    })
    .subscribe(status => {
      const dot = document.getElementById('realtime-dot');
      if (status === 'SUBSCRIBED') {
        dot.classList.remove('offline');
      } else {
        dot.classList.add('offline');
      }
    });

  // Realtime para mudanças de slides (gerenciador)
  db.channel(`slides-${ap.id}`)
    .on('postgres_changes', {
      event: '*',
      schema: 'public',
      table: 'slides',
      filter: `apresentacao_id=eq.${ap.id}`
    }, async () => {
      // Recarrega slides
      const { data: newSlides } = await db
        .from('slides')
        .select('*')
        .eq('apresentacao_id', ap.id)
        .order('ordem');
      if (newSlides) {
        buildSlides(newSlides);
        goToSlide(0);
        window.requestAnimationFrame(renderPointer);
      }
    })
    .subscribe();
}

window.addEventListener('resize', renderPointer);
window.addEventListener('scroll', renderPointer, true);

init();
</script>
