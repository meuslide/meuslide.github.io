<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Apresentação</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; overflow:hidden; background:#000; }

body {
  font-family: 'Syne', sans-serif;
  color: white;
}

/* ── SLIDE VIEWER ── */
#viewer {
  width:100vw;
  height:100vh;
  position:relative;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#000;
}

.slide {
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  opacity:0;
  pointer-events:none;
  transition: opacity 0.4s ease;
}
.slide.active {
  opacity:1;
  pointer-events:auto;
}
.slide img {
  max-width:100%;
  max-height:100vh;
  object-fit:contain;
  display:block;
}
.slide video {
  max-width:100%;
  max-height:100vh;
  object-fit:contain;
  display:block;
}

/* ── HUD ── */
#hud {
  position:fixed;
  bottom:0; left:0; right:0;
  padding:20px 28px;
  display:flex;
  align-items:center;
  gap:16px;
  background: linear-gradient(to top, rgba(0,0,0,0.7) 0%, transparent 100%);
  opacity:0;
  transition: opacity 0.3s;
  pointer-events:none;
}
body:hover #hud { opacity:1; }

.slide-counter {
  font-size:0.8rem;
  font-weight:700;
  letter-spacing:0.1em;
  text-transform:uppercase;
  opacity:0.7;
}
.hud-title {
  font-size:0.85rem;
  font-weight:700;
  opacity:0.9;
  flex:1;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}
.realtime-dot {
  width:8px; height:8px;
  border-radius:50%;
  background:#1a9e5c;
  animation:pulse-dot 2s ease-in-out infinite;
  flex-shrink:0;
}
.realtime-dot.offline { background:#888; animation:none; }
@keyframes pulse-dot {
  0%,100% { opacity:1; transform:scale(1); }
  50% { opacity:0.5; transform:scale(0.8); }
}
.realtime-label {
  font-size:0.72rem;
  font-weight:700;
  letter-spacing:0.08em;
  text-transform:uppercase;
  opacity:0.6;
}

/* ── LOADING ── */
#loading {
  position:fixed;
  inset:0;
  background:#000;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:20px;
  z-index:100;
  transition: opacity 0.5s ease;
}
#loading.fade { opacity:0; pointer-events:none; }

.load-logo {
  font-size:1.6rem;
  font-weight:800;
  letter-spacing:-0.04em;
}
.load-logo span { color:#e84d2a; }
.load-spinner {
  width:32px; height:32px;
  border:2px solid rgba(255,255,255,0.15);
  border-top-color:white;
  border-radius:50%;
  animation:spin 0.8s linear infinite;
}
@keyframes spin { to { transform:rotate(360deg); } }
.load-text {
  font-size:0.8rem;
  letter-spacing:0.1em;
  text-transform:uppercase;
  opacity:0.5;
}

/* ── ERROR ── */
#error-state {
  display:none;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  height:100vh;
  text-align:center;
  gap:16px;
  padding:40px;
}
#error-state h2 { font-size:1.4rem; opacity:0.9; }
#error-state p { font-size:0.9rem; opacity:0.5; max-width:320px; line-height:1.5; }
.btn-back {
  margin-top:8px;
  padding:12px 28px;
  background:white;
  color:#000;
  border:none;
  border-radius:8px;
  font-family:'Syne',sans-serif;
  font-weight:700;
  font-size:0.85rem;
  cursor:pointer;
  letter-spacing:0.04em;
  text-transform:uppercase;
}
</style>
</head>
<body>

<div id="loading">
  <div class="load-logo">Meu<span>Slide</span></div>
  <div class="load-spinner"></div>
  <div class="load-text">Carregando apresentação...</div>
</div>

<div id="error-state">
  <h2>Apresentação não encontrada</h2>
  <p>O código informado não existe. Verifique o endereço ou crie uma nova apresentação.</p>
  <button class="btn-back" onclick="history.back()">← Voltar</button>
</div>

<div id="viewer"></div>

<div id="hud">
  <div class="slide-counter" id="hud-counter">1 / 1</div>
  <div class="hud-title" id="hud-title"></div>
  <div class="realtime-dot" id="realtime-dot"></div>
  <div class="realtime-label">Ao vivo</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// ══════════════════════════════════════
//  ⚙️  CONFIGURE AQUI
// ══════════════════════════════════════
const SUPABASE_URL = 'https://mamhiknpgqbzszmloibk.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_99_Zxj_XydCC8x7cAaKmpA_hbEgebR0';
// ══════════════════════════════════════

const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

function getCodigo() {
  const p = new URLSearchParams(location.search);
  return (p.get('codigo') || location.pathname.replace(/^\//, '').split('/')[0] || '').toLowerCase();
}

const codigo = getCodigo();
let slides = [];
let currentIndex = 0;
let apresentacaoId = null;

function showError() {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('error-state').style.display = 'flex';
}

function buildSlides(slidesData) {
  const viewer = document.getElementById('viewer');
  viewer.innerHTML = '';
  slides = [];

  slidesData.forEach((s, i) => {
    const div = document.createElement('div');
    div.className = 'slide';
    div.id = `slide-${i}`;

    if (s.tipo === 'video') {
      const v = document.createElement('video');
      v.src = s.arquivo_url;
      v.controls = false;
      v.loop = true;
      v.playsInline = true;
      div.appendChild(v);
    } else {
      const img = document.createElement('img');
      img.src = s.arquivo_url;
      img.alt = `Slide ${i+1}`;
      div.appendChild(img);
    }

    viewer.appendChild(div);
    slides.push(div);
  });
}

function goToSlide(index, skipPause) {
  if (index < 0 || index >= slides.length) return;

  // Pausa vídeo atual
  if (!skipPause) {
    const curVid = slides[currentIndex]?.querySelector('video');
    if (curVid) { curVid.pause(); curVid.currentTime = 0; }
  }

  slides.forEach(s => s.classList.remove('active'));
  currentIndex = index;
  slides[currentIndex].classList.add('active');

  document.getElementById('hud-counter').textContent = `${currentIndex + 1} / ${slides.length}`;
}

function handleAcao(acao, slideAtual) {
  if (acao === 'proximo' || acao === 'anterior' || acao === 'ir_para') {
    const target = slideAtual;
    
    if (target !== currentIndex) {
      goToSlide(target);
    } else {
      // Mesmo slide — pode ser play/pause de vídeo
      const vid = slides[currentIndex]?.querySelector('video');
      if (vid) {
        if (acao === 'proximo') {
          vid.paused ? vid.play() : goToSlide(currentIndex + 1);
        } else if (acao === 'anterior') {
          !vid.paused ? vid.pause() : goToSlide(currentIndex - 1);
        }
      }
    }
  }
}

async function init() {
  if (!codigo) { showError(); return; }

  // Busca apresentação
  const { data: ap } = await db
    .from('apresentacoes')
    .select('id, titulo')
    .eq('codigo', codigo)
    .single();

  if (!ap) { showError(); return; }
  apresentacaoId = ap.id;

  document.title = ap.titulo || 'Apresentação';
  document.getElementById('hud-title').textContent = ap.titulo || codigo;

  // Busca slides
  const { data: slidesData } = await db
    .from('slides')
    .select('*')
    .eq('apresentacao_id', ap.id)
    .order('ordem');

  if (!slidesData || slidesData.length === 0) { showError(); return; }

  buildSlides(slidesData);

  // Busca estado atual
  const { data: ctrl } = await db
    .from('controle')
    .select('slide_atual')
    .eq('apresentacao_id', ap.id)
    .single();

  const startIndex = ctrl ? Math.min(ctrl.slide_atual, slides.length - 1) : 0;
  goToSlide(startIndex);

  // Remove loading
  const loadEl = document.getElementById('loading');
  loadEl.classList.add('fade');
  setTimeout(() => loadEl.style.display = 'none', 500);

  // ── Realtime ──
  const channel = db.channel(`controle-${ap.id}`)
    .on('postgres_changes', {
      event: 'UPDATE',
      schema: 'public',
      table: 'controle',
      filter: `apresentacao_id=eq.${ap.id}`
    }, payload => {
      const { slide_atual, acao } = payload.new;
      handleAcao(acao, slide_atual);
    })
    .subscribe(status => {
      const dot = document.getElementById('realtime-dot');
      if (status === 'SUBSCRIBED') {
        dot.classList.remove('offline');
      } else {
        dot.classList.add('offline');
      }
    });

  // Realtime para mudanças de slides (gerenciador)
  db.channel(`slides-${ap.id}`)
    .on('postgres_changes', {
      event: '*',
      schema: 'public',
      table: 'slides',
      filter: `apresentacao_id=eq.${ap.id}`
    }, async () => {
      // Recarrega slides
      const { data: newSlides } = await db
        .from('slides')
        .select('*')
        .eq('apresentacao_id', ap.id)
        .order('ordem');
      if (newSlides) {
        buildSlides(newSlides);
        goToSlide(0);
      }
    })
    .subscribe();
}

init();
</script>
</body>
</html>
